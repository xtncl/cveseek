name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  build-release:
    name: Build (${{ matrix.friendly }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            friendly: linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            friendly: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-12
            friendly: macos-x64
          - target: aarch64-apple-darwin
            os: macos-14
            friendly: macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            friendly: windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache apt packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ matrix.target }}-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Install aarch64 musl cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="cveseek-${{ github.ref_name }}-${{ matrix.friendly }}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" cveseek

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/cveseek.exe"
          $exe = "cveseek-${{ github.ref_name }}-${{ matrix.friendly }}.exe"
          Copy-Item $src $exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: |
            cveseek-*.tar.gz
            cveseek-*.exe
          generate_release_notes: true
